name: Build & Push therapy:2.0

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_AUTH_PORTAL_URL: ${{ secrets.AUTH_PORTAL_URL }}
          VITE_DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Log in to Container Registry
        run: echo "${{ secrets.PASSWORD }}" | docker login https://bunker.mantracare.com/ -u "${{ secrets.USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            bunker.mantracare.com/lovable/therapy:2.0
            bunker.mantracare.com/lovable/therapy:latest
          build-args: |
            VITE_AUTH_PORTAL_URL=${{ secrets.AUTH_PORTAL_URL }}
            VITE_DATABASE_URL=${{ secrets.DATABASE_URL }}
            BUILD_ID=${{ github.run_id }}
