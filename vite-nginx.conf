server {
    listen 80;

    # Never cache the HTML entry point — forces browser to re-fetch on every visit
    location ~* \.html$ {
        root   /usr/share/nginx/html;
        try_files $uri /couple_module/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed JS/CSS assets can be cached long-term (filenames change on rebuild)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
        root   /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # SPA fallback for all other routes
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /couple_module/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    error_page 404 /couple_module/index.html;

    location = / {
        return 301 /couple_module/;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
